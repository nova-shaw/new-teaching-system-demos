<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">

  <title>Login</title>

  <style type="text/css">
    @import "../../_assets/css/base.css";

    body {
      background-image: linear-gradient(180deg, #5d76da, #474482);
      background-image: linear-gradient(#89a5f8, #afd5ef);
      background-image: linear-gradient(#415cac, #679ec3);
      justify-content: center;
    }

    #form_login {
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 1em;
      /*align-items: flex-end;*/
      align-items: center;
      margin-bottom: 18vh;
    }

    input {
      line-height: 2;
      padding: 0 0.5em;
    }
    input::placeholder { color: #ccc; }

    #input_name {

    }

    #input_password {

    }

    #btn_login {
      background-color: #f1678c;
      /*font-weight: 700;*/
      line-height: 2;
      border-radius: 0.25em;
      width: 7em;
    }

    #nto-logo {
      width: 8em;
      height: auto;
    }

  </style>

</head>

<body>

  <form action="." id="form_login">
    <input type="text" name="input_name" id="input_name" placeholder="Username">
    <input type="password" name="input_password" id="input_password" placeholder="Password">
    <button id="btn_login" type="submit">Login</button>
  </form>

  <script type="text/javascript">
   document.querySelector('#form_login').addEventListener('submit', e => {
     e.preventDefault();
     window.location.href = './menu.html';
   });

</html>
